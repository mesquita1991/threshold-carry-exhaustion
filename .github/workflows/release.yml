name: release-paper

on:
  release:
    types: [published]

permissions:
  contents: write

jobs:
  build-and-attach:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v4
      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y g++ python3-pip texlive-latex-extra texlive-fonts-recommended lmodern
          python3 -m pip install --break-system-packages -r requirements.txt
      - name: Verify package and build paper
        run: ./run_all.sh
      - name: Attach verified PDF and checksum
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          cp build/paper/threshold_carry_exhaustion.pdf \
            Threshold_Carry_Events_Certified_Exhaustion.pdf
          sha256sum Threshold_Carry_Events_Certified_Exhaustion.pdf \
            > Threshold_Carry_Events_Certified_Exhaustion.pdf.sha256
          gh release upload "${{ github.event.release.tag_name }}" \
            Threshold_Carry_Events_Certified_Exhaustion.pdf \
            Threshold_Carry_Events_Certified_Exhaustion.pdf.sha256 \
            --clobber
