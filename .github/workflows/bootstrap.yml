name: Bootstrap source tree

on:
  push:
    paths:
      - ".github/workflows/bootstrap.yml"

permissions:
  contents: write

jobs:
  unpack:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Reconstruct and install source tree
        shell: bash
        run: |
          set -euo pipefail
          cat .bootstrap/chunks/*.bin > /tmp/source.tar.xz
          echo "95260748722e7753f34801e45da071fb6cf8399c6047e11abd0815231f076193  /tmp/source.tar.xz" | sha256sum -c -
          mkdir -p /tmp/source
          tar -xJf /tmp/source.tar.xz -C /tmp/source
          rsync -a --delete --exclude='.git' /tmp/source/threshold-carry-exhaustion-main/ ./

      - name: Commit reproducible proof package
        shell: bash
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "Release reproducible proof package v1.0.0"
          git push
