name: verify

on:
  push:
  pull_request:
  workflow_dispatch:

jobs:
  full-verification:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v4
      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y g++ python3-pip texlive-latex-extra texlive-fonts-recommended lmodern poppler-utils
          python3 -m pip install --break-system-packages -r requirements.txt
      - name: Run exact verification
        run: bash ./run_all.sh
